<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PA 3</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles.css">

<body>
    <div class="container">
        <h1>Library Section Checker</h1>
        <hr>
        <br>
        <form>
            <label for="section"> Enter a Section:</label>
            <input type="text" class="form-control" id="section" placeholder="Input section name">

            <br>
            
            <div class="d-flex">
                <button class="btn btn-login" onclick="identifySection()">Check</button>
                <button class="btn btn-cancel" onclick="window.location.reload()">Refresh</button>
            </div>

        </form>

    <script src="main.js"></script>
</body>
